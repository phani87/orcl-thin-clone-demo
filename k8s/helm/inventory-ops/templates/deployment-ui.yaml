apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inventory-ops.fullname" . }}-ui
  labels:
    {{- include "inventory-ops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "inventory-ops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "inventory-ops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
        retail.oracle.com/scenario-label: {{ .Values.environment.scenarioLabel | quote }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: API_UPSTREAM
              value: "http://{{ include "inventory-ops.fullname" . }}-api:{{ .Values.api.service.port }}"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: ui-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
      volumes:
        - name: ui-config
          configMap:
            name: {{ include "inventory-ops.fullname" . }}-ui-config
