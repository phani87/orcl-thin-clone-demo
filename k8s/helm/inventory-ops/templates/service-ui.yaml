apiVersion: v1
kind: Service
metadata:
  name: {{ include "inventory-ops.fullname" . }}-ui
  labels:
    {{- include "inventory-ops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
  selector:
    {{- include "inventory-ops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
